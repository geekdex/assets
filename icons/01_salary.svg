<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FACFE"/>
      <stop offset="100%" style="stop-color:#00F2FE"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0f7ff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4FACFE" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner glow -->
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Banknote body -->
  <rect x="20" y="44" width="88" height="52" rx="8" fill="white" fill-opacity="0.25"/>
  <rect x="20" y="44" width="88" height="52" rx="8" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <!-- Dollar sign circle -->
  <circle cx="64" cy="70" r="16" fill="white" fill-opacity="0.3"/>
  <text x="64" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white">¥</text>
  <!-- Lines -->
  <rect x="28" y="54" width="16" height="3" rx="1.5" fill="white" fill-opacity="0.5"/>
  <rect x="28" y="60" width="12" height="3" rx="1.5" fill="white" fill-opacity="0.5"/>
  <rect x="84" y="54" width="16" height="3" rx="1.5" fill="white" fill-opacity="0.5"/>
  <rect x="88" y="60" width="12" height="3" rx="1.5" fill="white" fill-opacity="0.5"/>
  <!-- Top label line -->
  <rect x="36" y="34" width="56" height="5" rx="2.5" fill="white" fill-opacity="0.4"/>
</svg>
