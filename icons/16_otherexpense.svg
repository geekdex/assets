<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#868F96"/>
      <stop offset="100%" style="stop-color:#596164"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#596164" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Wallet shape -->
  <rect x="18" y="40" width="92" height="60" rx="10" fill="white" fill-opacity="0.25"/>
  <rect x="18" y="40" width="92" height="60" rx="10" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5"/>
  <!-- Wallet pocket -->
  <rect x="72" y="52" width="30" height="36" rx="8" fill="white" fill-opacity="0.2"/>
  <rect x="72" y="52" width="30" height="36" rx="8" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Coin in pocket -->
  <circle cx="87" cy="70" r="10" fill="white" fill-opacity="0.3"/>
  <circle cx="87" cy="70" r="10" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="87" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="white" fill-opacity="0.7">¥</text>
  <!-- Card lines on left side -->
  <rect x="26" y="56" width="36" height="5" rx="2.5" fill="white" fill-opacity="0.4"/>
  <rect x="26" y="66" width="28" height="4" rx="2" fill="white" fill-opacity="0.3"/>
  <rect x="26" y="76" width="32" height="4" rx="2" fill="white" fill-opacity="0.3"/>
  <!-- Three dots at top indicating "other" -->
  <circle cx="46" cy="30" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="64" cy="28" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="82" cy="30" r="5" fill="white" fill-opacity="0.5"/>
</svg>
