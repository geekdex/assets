<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5C6BC0" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Coin stack -->
  <ellipse cx="64" cy="90" rx="32" ry="10" fill="white" fill-opacity="0.35"/>
  <rect x="32" y="72" width="64" height="18" rx="2" fill="white" fill-opacity="0.25"/>
  <ellipse cx="64" cy="72" rx="32" ry="10" fill="white" fill-opacity="0.4"/>
  <rect x="32" y="54" width="64" height="18" rx="2" fill="white" fill-opacity="0.3"/>
  <ellipse cx="64" cy="54" rx="32" ry="10" fill="white" fill-opacity="0.5"/>
  <!-- Top coin highlight -->
  <ellipse cx="64" cy="54" rx="28" ry="7" fill="none" stroke="white" stroke-opacity="0.7" stroke-width="1.5"/>
  <!-- ¥ on top coin -->
  <text x="64" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="white">¥</text>
  <!-- Plus dots -->
  <circle cx="32" cy="34" r="6" fill="white" fill-opacity="0.5"/>
  <circle cx="96" cy="34" r="6" fill="white" fill-opacity="0.5"/>
  <circle cx="64" cy="28" r="6" fill="white" fill-opacity="0.5"/>
  <!-- Plus sign -->
  <rect x="60" y="22" width="8" height="20" rx="3" fill="none"/>
  <text x="64" y="40" text-anchor="middle" font-size="20" fill="white" fill-opacity="0.7" font-weight="bold">···</text>
</svg>
