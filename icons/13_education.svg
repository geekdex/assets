<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDC830"/>
      <stop offset="100%" style="stop-color:#F37335"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FDC830" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Graduation cap base -->
  <ellipse cx="64" cy="66" rx="40" ry="12" fill="white" fill-opacity="0.3"/>
  <ellipse cx="64" cy="66" rx="40" ry="12" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5"/>
  <!-- Cap top -->
  <polygon points="64,26 104,58 64,66 24,58" fill="white" fill-opacity="0.3"/>
  <polygon points="64,26 104,58 64,66 24,58" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Tassel string -->
  <line x1="104" y1="60" x2="104" y2="84" stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel end -->
  <line x1="98" y1="84" x2="110" y2="84" stroke="white" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="84" x2="98" y2="96" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="84" x2="103" y2="97" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="84" x2="110" y2="96" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <!-- Book below cap -->
  <rect x="38" y="76" width="52" height="34" rx="4" fill="white" fill-opacity="0.25"/>
  <rect x="38" y="76" width="52" height="34" rx="4" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="64" y1="76" x2="64" y2="110" stroke="white" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Book lines -->
  <line x1="44" y1="85" x2="60" y2="85" stroke="white" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="92" x2="60" y2="92" stroke="white" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="85" x2="84" y2="85" stroke="white" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="92" x2="84" y2="92" stroke="white" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
