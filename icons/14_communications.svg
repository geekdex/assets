<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4DB"/>
      <stop offset="100%" style="stop-color:#0083B0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00B4DB" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Phone body -->
  <rect x="42" y="22" width="44" height="76" rx="10" fill="white" fill-opacity="0.25"/>
  <rect x="42" y="22" width="44" height="76" rx="10" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="48" y="32" width="32" height="48" rx="4" fill="white" fill-opacity="0.2"/>
  <!-- Signal waves radiating from phone -->
  <path d="M92 38 Q102 52 92 66" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100 32 Q116 52 100 72" fill="none" stroke="white" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Message bubble on screen -->
  <rect x="52" y="40" width="24" height="14" rx="5" fill="white" fill-opacity="0.4"/>
  <polygon points="56,54 52,60 62,54" fill="white" fill-opacity="0.4"/>
  <!-- Dots inside bubble -->
  <circle cx="58" cy="47" r="2" fill="white" fill-opacity="0.7"/>
  <circle cx="64" cy="47" r="2" fill="white" fill-opacity="0.7"/>
  <circle cx="70" cy="47" r="2" fill="white" fill-opacity="0.7"/>
  <!-- Home button -->
  <circle cx="64" cy="87" r="5" fill="white" fill-opacity="0.4"/>
  <circle cx="64" cy="87" r="5" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
</svg>
