<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F093FB"/>
      <stop offset="100%" style="stop-color:#F5576C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F093FB" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Plate -->
  <circle cx="64" cy="72" r="36" fill="white" fill-opacity="0.2"/>
  <circle cx="64" cy="72" r="36" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5"/>
  <circle cx="64" cy="72" r="26" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Fork -->
  <line x1="40" y1="30" x2="40" y2="60" stroke="white" stroke-opacity="0.8" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="30" x2="36" y2="44" stroke="white" stroke-opacity="0.8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="30" x2="44" y2="44" stroke="white" stroke-opacity="0.8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knife -->
  <line x1="88" y1="30" x2="88" y2="60" stroke="white" stroke-opacity="0.8" stroke-width="3" stroke-linecap="round"/>
  <path d="M88 30 C92 30 96 38 88 44" fill="white" fill-opacity="0.6"/>
  <!-- Food on plate - abstract bowl/rice -->
  <ellipse cx="64" cy="68" rx="18" ry="12" fill="white" fill-opacity="0.3"/>
  <path d="M46 68 Q64 52 82 68" fill="white" fill-opacity="0.4"/>
  <!-- Steam lines -->
  <path d="M56 52 Q54 46 56 40" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M64 50 Q62 44 64 38" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72 52 Q70 46 72 40" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
</svg>
