<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FA709A"/>
      <stop offset="100%" style="stop-color:#FEE140"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FA709A" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Shopping bag -->
  <path d="M32 52 L38 100 Q38 104 44 104 L84 104 Q90 104 90 100 L96 52 Z" fill="white" fill-opacity="0.25"/>
  <path d="M32 52 L38 100 Q38 104 44 104 L84 104 Q90 104 90 100 L96 52 Z" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Bag top bar -->
  <rect x="28" y="46" width="72" height="10" rx="5" fill="white" fill-opacity="0.4"/>
  <!-- Handle -->
  <path d="M48 46 Q48 28 64 28 Q80 28 80 46" fill="none" stroke="white" stroke-opacity="0.8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tag/label on bag -->
  <rect x="50" y="68" width="28" height="18" rx="4" fill="white" fill-opacity="0.3"/>
  <rect x="50" y="68" width="28" height="18" rx="4" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="64" y="81" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="white">SALE</text>
  <!-- Star decoration -->
  <text x="90" y="36" font-size="18" fill="white" fill-opacity="0.6">★</text>
</svg>
