  <circle cx="36" cy="98" r="14" fill="white" fill-opacity="0.15"/>
  <circle cx="36" cy="98" r="14" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="3"/>
  <circle cx="36" cy="98" r="6" fill="white" fill-opacity="0.5"/>
  <circle cx="92" cy="98" r="14" fill="white" fill-opacity="0.15"/>
