  <circle cx="92" cy="98" r="6" fill="white" fill-opacity="0.5"/>
  <!-- Headlight -->
  <ellipse cx="108" cy="76" rx="5" ry="4" fill="white" fill-opacity="0.7"/>
  <!-- Speed lines -->
  <line x1="10" y1="72" x2="22" y2="72" stroke="white" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="80" x2="22" y2="80" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
