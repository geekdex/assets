      <stop offset="0%" style="stop-color:#43E97B"/>
      <stop offset="100%" style="stop-color:#38F9D7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#43E97B" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Car body -->
  <rect x="16" y="66" width="96" height="32" rx="8" fill="white" fill-opacity="0.3"/>
  <rect x="16" y="66" width="96" height="32" rx="8" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5"/>
  <!-- Car roof/cabin -->
  <path d="M32 66 L40 42 Q44 36 52 36 L76 36 Q84 36 88 42 L96 66 Z" fill="white" fill-opacity="0.25"/>
  <path d="M32 66 L40 42 Q44 36 52 36 L76 36 Q84 36 88 42 L96 66 Z" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Windows -->
  <path d="M44 64 L50 44 Q52 40 56 40 L72 40 Q76 40 78 44 L84 64 Z" fill="white" fill-opacity="0.3"/>
