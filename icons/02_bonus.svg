<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7971E"/>
      <stop offset="100%" style="stop-color:#FFD200"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F7971E" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Gift box body -->
  <rect x="24" y="62" width="80" height="46" rx="6" fill="white" fill-opacity="0.25"/>
  <rect x="24" y="62" width="80" height="46" rx="6" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <!-- Gift box lid -->
  <rect x="20" y="50" width="88" height="18" rx="6" fill="white" fill-opacity="0.35"/>
  <rect x="20" y="50" width="88" height="18" rx="6" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <!-- Ribbon vertical -->
  <rect x="58" y="50" width="12" height="58" rx="4" fill="white" fill-opacity="0.5"/>
  <!-- Ribbon bow left -->
  <path d="M58 50 C50 40 30 38 32 50 C34 58 52 54 58 50Z" fill="white" fill-opacity="0.7"/>
  <!-- Ribbon bow right -->
  <path d="M70 50 C78 40 98 38 96 50 C94 58 76 54 70 50Z" fill="white" fill-opacity="0.7"/>
  <!-- Bow center knot -->
  <circle cx="64" cy="50" r="6" fill="white"/>
  <!-- Stars decoration -->
  <text x="38" y="88" font-size="14" fill="white" fill-opacity="0.6">✦</text>
  <text x="82" y="82" font-size="10" fill="white" fill-opacity="0.5">✦</text>
  <text x="76" y="96" font-size="8" fill="white" fill-opacity="0.4">✦</text>
</svg>
