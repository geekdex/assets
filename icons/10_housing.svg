<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA"/>
      <stop offset="100%" style="stop-color:#764BA2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#667EEA" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="6" y="6" width="116" height="116" rx="23" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- House body -->
  <rect x="24" y="64" width="80" height="48" rx="4" fill="white" fill-opacity="0.25"/>
  <rect x="24" y="64" width="80" height="48" rx="4" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2.5"/>
  <!-- Roof -->
  <polygon points="16,66 64,22 112,66" fill="white" fill-opacity="0.3"/>
  <polygon points="16,66 64,22 112,66" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="78" y="28" width="12" height="26" rx="2" fill="white" fill-opacity="0.35"/>
  <!-- Door -->
  <rect x="54" y="82" width="20" height="30" rx="4" fill="white" fill-opacity="0.4"/>
  <circle cx="70" cy="97" r="2.5" fill="white" fill-opacity="0.8"/>
  <!-- Windows -->
  <rect x="32" y="72" width="18" height="16" rx="3" fill="white" fill-opacity="0.3"/>
  <line x1="41" y1="72" x2="41" y2="88" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
  <line x1="32" y1="80" x2="50" y2="80" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="78" y="72" width="18" height="16" rx="3" fill="white" fill-opacity="0.3"/>
  <line x1="87" y1="72" x2="87" y2="88" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
  <line x1="78" y1="80" x2="96" y2="80" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
</svg>
